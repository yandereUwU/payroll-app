<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<h2>Пользователи</h2>

<div>
  <input id="login" placeholder="Логин">
  <input id="password" placeholder="Пароль">
  <select id="role">
    <option value="admin">Администратор</option>
    <option value="accountant">Бухгалтер</option>
    <option value="manager">Руководитель</option>
    <option value="employee">Сотрудник</option>
  </select>
  <button onclick="addUser()">Добавить</button>
</div>

<table border="1" width="100%">
<thead>
<tr>
  <th>ID</th>
  <th>Логин</th>
  <th>Роль</th>
  <th>Действия</th>
</tr>
</thead>
<tbody id="userTable"></tbody>
</table>

<button onclick="goBack()">Назад</button>

<script src="auth.js"></script>


<script>
checkAccess(['admin']);

const db = require('../database');

async function loadUsers() {
  const users = await db.getAllUsers(); // ✅ исправлено
  const table = document.getElementById('userTable');
  table.innerHTML = '';

  users.forEach(u => {
    table.innerHTML += `
      <tr>
        <td>${u.id}</td>
        <td>${u.login}</td>
        <td>${u.role}</td>
        <td>
          <button onclick="deleteUser(${u.id})">Удалить</button>
        </td>
      </tr>
    `;
  });
}

async function addUser() {
  const login = document.getElementById('login').value;
  const password = document.getElementById('password').value;
  const role = document.getElementById('role').value;

  if (!login || !password) {
    alert('Заполни поля');
    return;
  }

  try {
    await db.createUser(login, password, role); // ✅ исправлено
    loadUsers();
  } catch(e) {
    alert('Ошибка: возможно логин уже существует');
  }
}

async function deleteUser(id) {
  await db.deleteUser(id);
  loadUsers();
}

function goBack() {
  location.href = 'dashboard.html';
}

window.onload = loadUsers;
</script>

</body>
</html>
