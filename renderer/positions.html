<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<h2>Должности</h2>

<div>
  <input id="name" placeholder="Название должности">
  <button onclick="addPosition()">Добавить</button>
</div>

<table border="1" width="100%">
<thead>
<tr>
  <th>ID</th>
  <th>Название</th>
  <th>Действия</th>
</tr>
</thead>
<tbody id="posTable"></tbody>
</table>

<button onclick="goBack()">Назад</button>

<script>
const db = require('../database');

async function loadPositions() {
  const data = await db.getPositions();
  const table = document.getElementById('posTable');
  table.innerHTML = '';

  data.forEach(p => {
    table.innerHTML += `
      <tr>
        <td>${p.id}</td>
        <td>${p.name}</td>
        <td>
          <button onclick="deletePosition(${p.id})">Удалить</button>
        </td>
      </tr>
    `;
  });
}

async function addPosition() {
  const name = document.getElementById('name').value;

  if (!name) {
    alert('Введите название');
    return;
  }

  try {
    await db.addPosition(name);
    loadPositions();
  } catch(e) {
    alert('Такая должность уже есть');
  }
}

async function deletePosition(id) {
  try {
    await db.deletePosition(id);
    loadPositions();
  } catch(e) {
    alert('Нельзя удалить: есть сотрудники с этой должностью');
  }
}

function goBack() {
  location.href = 'dashboard.html';
}

window.onload = loadPositions;
</script>

</body>
</html>
